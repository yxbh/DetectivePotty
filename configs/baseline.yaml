global:
  # Root directory for recorded events (clips, frames, crops, metadata.json). Gitignored.
  dataset_dir: dataset
  # Ultralytics YOLO weights used for dog detection (path or known model name).
  model_name: models/yolo11m.pt
  # Detection runs on frames downscaled to this long edge (YOLO imgsz); boxes are
  # mapped back to full resolution before crops/frames are saved.
  inference_long_edge_px: 640
  # Inference device: auto | cpu | mps | cuda.
  device: auto
  # Logging verbosity: DEBUG | INFO | WARNING | ERROR.
  log_level: INFO
  # Dog identities offered as manual labels in the review portal.
  dogs:
    - Gromit
    - WALL-E
    - Apollo

# Keypoint-pose pee/poop classifier (additive). Requires `uv sync --extra pose`.
# When enabled, PosePottyClassifier replaces the bbox squat heuristic for the weak
# guess, deriving squat/arched-back/stationary signals from real keypoints instead
# of bbox height/aspect jitter. It falls back to the bbox heuristic automatically
# whenever pose is missing or low-quality, so it can never do worse than bbox alone.
# The guess is still a weak prefill: every event stays needs_label/unlabeled.
pose:
  enabled: true
  backend: superanimal
  enable_pose_classifier: true
  # Pose runs only on recorded candidate windows, not every dog on every frame.
  candidate_only: true
  # Detection-gate augmentation stays OFF: experimental and not yet validated
  # against the real superanimal backend.
  enable_pose_gate: false
  # Optional night/IR aid: build the pose crop from the union of detector boxes
  # over this trailing window so an under-segmented IR box doesn't feed pose a
  # partial crop. 0.0 disables it; raise (e.g. 0.5) if night crops look clipped.
  box_union_window_s: 0.0

protect:
  nvr_host: https://nvr.bennet.lan
  # Secret values are read from these environment variables; never put credentials in YAML.
  api_key_env: DETECTIVEPOTTY_NVR_API_KEY
  username_env: DETECTIVEPOTTY_NVR_USERNAME
  password_env: DETECTIVEPOTTY_NVR_PASSWORD
  # nvr.bennet.lan presents a self-signed certificate, so TLS verification is disabled.
  verify_tls: false

# `id` is the real UniFi Protect camera id (from `detectivepotty list-cameras`); the
# pipeline resolves RTSPS streams by this id, so it must match the NVR exactly.
#
# Per-camera fields (shared by every entry below):
#   id / name              - unique id (used in dataset paths) / portal display name.
#   enabled                - false skips the camera on a run.
#   input.kind             - protect | file | rtsp.
#   input.path             - clip path for kind: file.
#   input.source_id        - optional label recorded in metadata.
#   substream_choice       - RTSPS channel low|medium|high (protect only).
#   animal_supported       - true if the camera emits UniFi animal smart-detects.
#   detection_conf_threshold - min YOLO confidence (0..1) to count a dog; tune with
#                              `tune-detect`. These clips need 0.20.
#   sample_rate_fps        - frames per second sampled for detection.
#   pre_roll_s/post_roll_s - footage kept before/after the event (0 for file clips).
cameras:
  # Offline no-NVR sample. Enable after placing the local Gromit pee clip at this path.
  - id: backyard-grass-file-sample
    name: Backyard Grass sample clip
    enabled: true                 # Set false to skip this camera on a run.
    input:
      kind: file                  # protect | file | rtsp.
      path: data/unifi_direct_clip_downloads/Backyard Grass 6-6-2026, 09.10.47 GMT+10 - 6-6-2026, 09.11.03 GMT+10.mp4
      source_id: file:backyard-grass-gromit-pee  # Optional label recorded in metadata.
    substream_choice: high        # RTSPS channel (protect only); ignored for files.
    animal_supported: false       # File clips have no live smart-detect feed.
    detection_conf_threshold: 0.20  # Min YOLO confidence (0..1); tune with `tune-detect`.
    sample_rate_fps: 10.0         # Frames per second sampled for detection.
    pre_roll_s: 0.0               # Files have no live pre-roll buffer.
    post_roll_s: 0.0

  - id: backyard-grass-file-1946
    name: Backyard Grass 19:46 clip
    enabled: true
    input:
      kind: file
      path: data/unifi_direct_clip_downloads/Backyard Grass 6-6-2026, 19.46.40 GMT+10 - 6-6-2026, 19.47.30 GMT+10.mp4
      source_id: file:backyard-grass-1946
    substream_choice: high
    animal_supported: false
    detection_conf_threshold: 0.20
    sample_rate_fps: 10.0
    pre_roll_s: 0.0
    post_roll_s: 0.0

