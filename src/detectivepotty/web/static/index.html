<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DetectivePotty Review</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <h1>DetectivePotty Review</h1>
      <p>Review detected potty events and label clips for training.</p>
    </header>

    <main class="layout">
      <section class="sidebar">
        <div class="filters">
          <label>
            Status
            <select id="status-filter">
              <option value="" selected>All</option>
              <option value="unlabeled">Unlabeled</option>
              <option value="labeled">Labeled</option>
              <option value="rejected">Rejected</option>
              <option value="uncertain">Uncertain</option>
            </select>
          </label>
          <label>
            Camera
            <input id="camera-filter" type="search" placeholder="Any camera" />
          </label>
          <button id="refresh-button" type="button">Refresh</button>
        </div>
        <div id="event-count" class="event-count"></div>
        <div id="event-list" class="event-list" aria-live="polite"></div>
      </section>

      <section class="detail" id="detail-pane">
        <div class="empty-state">Select an event to review.</div>
      </section>
    </main>

    <template id="event-card-template">
      <button class="event-card" type="button">
        <img class="event-thumb" alt="Event thumbnail" />
        <span class="event-meta">
          <strong class="event-camera"></strong>
          <span class="event-time"></span>
          <span class="event-dog"></span>
          <span>
            Guess: <span class="event-guess"></span>
            <span class="badge event-status"></span>
          </span>
        </span>
      </button>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
</html>
